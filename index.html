<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (May 09, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:30:33 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:53:25 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:22:52</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 12, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:49:31 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:51:44 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:02:12</span>
        </div>
        
    </div>
</body>
</html>
