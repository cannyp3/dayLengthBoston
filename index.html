<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 08, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:08:46 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:20:38 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:11:51</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 11, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:21:17 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:03:15 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:41:58</span>
        </div>
        
    </div>
</body>
</html>
