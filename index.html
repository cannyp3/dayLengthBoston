<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 16, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:02:44 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:27:30 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:24:45</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 26, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:04:28 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:30:33 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:26:04</span>
        </div>
        
    </div>
</body>
</html>
