<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 05, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:14:46 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>5:39:38 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:24:51</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>October 08, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:50:18 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:15:27 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:25:08</span>
        </div>
        
    </div>
</body>
</html>
