<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 14, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:19:50 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:20:04 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:00:13</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 15, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:03:02 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:26:11 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:23:08</span>
        </div>
        
    </div>
</body>
</html>
