<!DOCTYPE html>
<html>
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (November 03, 2025)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:21:26 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>4:36:41 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>10:15:15</span>
        </div>
    </div>
    
    <div class="card">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>February 07, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:52:19 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>5:07:07 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>10:14:48</span>
        </div>
        
    </div>
</body>
</html>
