<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 02, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:26:18 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:11:35 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:45:16</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 10, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:20:26 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:04:50 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:44:24</span>
        </div>
        
    </div>
</body>
</html>
