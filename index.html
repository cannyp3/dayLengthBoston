<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 30, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:11:35 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:29 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:14:54</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 01, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:27:51 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:10:39 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:42:48</span>
        </div>
        
    </div>
</body>
</html>
