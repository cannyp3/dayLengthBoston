<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 21, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:08:31 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:01 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:17:30</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>March 23, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:43:34 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:00:35 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:17:00</span>
        </div>
        
    </div>
</body>
</html>
