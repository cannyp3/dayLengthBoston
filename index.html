<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (February 24, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:29:13 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>5:28:40 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>10:59:27</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>October 17, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>7:00:38 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:00:43 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:00:05</span>
        </div>
        
    </div>
</body>
</html>
