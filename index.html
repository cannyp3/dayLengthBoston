<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 16, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:21:30 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:18:46 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:57:16</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 17, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:59:51 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:28:26 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:28:35</span>
        </div>
        
    </div>
</body>
</html>
