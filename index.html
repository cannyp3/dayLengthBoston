<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 29, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:11:07 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:34 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:15:27</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>March 31, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:29:35 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:09:32 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:39:57</span>
        </div>
        
    </div>
</body>
</html>
