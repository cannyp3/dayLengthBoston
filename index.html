<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 23, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:43:46 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:00:23 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:16:37</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 20, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:30:52 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:47:02 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:16:09</span>
        </div>
        
    </div>
</body>
</html>
