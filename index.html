<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 15, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:04:20 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:26:22 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:22:01</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 28, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:06:36 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:27:16 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:20:40</span>
        </div>
        
    </div>
</body>
</html>
