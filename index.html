<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (May 18, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:21:10 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:02:59 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:41:48</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 21, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:59:09 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:38:29 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:39:20</span>
        </div>
        
    </div>
</body>
</html>
