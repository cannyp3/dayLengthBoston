<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (February 27, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:24:31 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>5:32:22 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:07:51</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>October 14, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:57:08 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:05:31 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:08:22</span>
        </div>
        
    </div>
</body>
</html>
