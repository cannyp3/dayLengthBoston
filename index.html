<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 28, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:35:00 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:06:00 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:30:59</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 15, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:25:38 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:55:58 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:30:19</span>
        </div>
        
    </div>
</body>
</html>
