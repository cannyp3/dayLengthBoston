<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 16, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:56:01 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:52:27 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:56:26</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 27, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:38:17 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:34:34 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:56:16</span>
        </div>
        
    </div>
</body>
</html>
