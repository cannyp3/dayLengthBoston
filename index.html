<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 13, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>7:01:13 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:49:01 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:47:47</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 30, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:41:30 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:29:16 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>

        </div>
        
    </div>
</body>
</html>
