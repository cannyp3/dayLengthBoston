<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 07, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:14:37 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:23:32 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:08:54</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 08, 2026</span>
        </div>

            <span>Sunrise</span>
            <span>6:14:33 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>

    </div>
</body>
</html>
