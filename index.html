<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 03, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:13:08 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:01 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:12:53</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 04, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:22:41 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:14:01 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:51:20</span>
        </div>
        
    </div>
</body>
</html>
