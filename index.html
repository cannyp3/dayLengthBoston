<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 11, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>7:04:39 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:46:42 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>11:42:02</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>October 02, 2025</span>
        </div>

            <span>Sunrise</span>
            <span>6:43:41 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:25:46 PM</span>
        </div>

            <span>Day Length</span>

    </div>
</body>
</html>
