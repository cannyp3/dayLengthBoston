<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 14, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:07:56 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:23:46 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:15:49</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 17, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:27:33 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:52:35 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:25:02</span>
        </div>
        
    </div>
</body>
</html>
