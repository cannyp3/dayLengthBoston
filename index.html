<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 26, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:47:31 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:38:50 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:51:19</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 17, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:54:52 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:44:33 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:49:40</span>
        </div>
        
    </div>
</body>
</html>
