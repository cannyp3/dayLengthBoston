<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 20, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:56:28 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:32:02 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:35:33</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 22, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:00:13 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:36:55 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:36:42</span>
        </div>
        
    </div>
</body>
</html>
