<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 22, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:08:44 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:12 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:17:28</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>March 24, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:41:49 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:01:42 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:19:52</span>
        </div>
        
    </div>
</body>
</html>
