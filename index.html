<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 28, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:44:41 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:41:07 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:56:25</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 15, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:52:43 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:47:29 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:54:45</span>
        </div>
        
    </div>
</body>
</html>
