<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (May 21, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:18:33 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:05:59 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:47:26</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 24, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:02:21 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:33:46 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:31:24</span>
        </div>
        
    </div>
</body>
</html>
