<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 28, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:10:41 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:38 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:15:56</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>March 30, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:31:19 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:08:25 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:37:05</span>
        </div>
        
    </div>
</body>
</html>
