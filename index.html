<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 19, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:24:07 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:16:34 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:52:27</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 20, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:55:09 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:31:49 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:36:39</span>
        </div>
        
    </div>
</body>
</html>
