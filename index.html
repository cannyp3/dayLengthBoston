<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (May 01, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:40:34 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:44:30 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:03:56</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 11, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:48:27 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:53:06 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:04:39</span>
        </div>
        
    </div>
</body>
</html>
