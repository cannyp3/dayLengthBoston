<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 01, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:12:04 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:22 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:14:17</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 02, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:26:07 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:11:46 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:45:39</span>
        </div>
        
    </div>
</body>
</html>
