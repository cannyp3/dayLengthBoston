<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 18, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:59:34 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:29:46 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:30:11</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 25, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:03:25 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:32:10 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:28:45</span>
        </div>
        
    </div>
</body>
</html>
