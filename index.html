<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (March 30, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:31:31 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:08:14 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:36:43</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 13, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:23:33 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:59:31 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:35:58</span>
        </div>
        
    </div>
</body>
</html>
