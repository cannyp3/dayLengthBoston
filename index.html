<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 08, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:15:53 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:18:29 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:02:36</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 04, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:13:58 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:15:28 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:01:30</span>
        </div>
        
    </div>
</body>
</html>
