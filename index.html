<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 13, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:07:59 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:23:19 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:15:19</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 16, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:26:30 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:54:22 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:27:52</span>
        </div>
        
    </div>
</body>
</html>
