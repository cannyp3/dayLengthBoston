<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 12, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:18:15 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:21:14 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:02:59</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 13, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:06:16 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:23:55 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:17:38</span>
        </div>
        
    </div>
</body>
</html>
