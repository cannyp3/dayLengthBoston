<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (July 09, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:16:01 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:22:43 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:06:42</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>April 10, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:11:12 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:20:32 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:09:19</span>
        </div>
        
    </div>
</body>
</html>
