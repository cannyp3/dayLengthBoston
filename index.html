<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 11, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:08:12 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:22:19 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:14:07</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 14, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:24:25 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>6:57:56 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:33:31</span>
        </div>
        
    </div>
</body>
</html>
