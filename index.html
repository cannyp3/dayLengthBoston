<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (May 11, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:28:17 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:55:36 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>14:27:19</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 14, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:51:39 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:48:55 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:57:15</span>
        </div>
        
    </div>
</body>
</html>
