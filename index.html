<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 10, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:12:32 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:20:44 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:08:12</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 02, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:11:52 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:18:54 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:07:01</span>
        </div>
        
    </div>
</body>
</html>
