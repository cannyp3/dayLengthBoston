<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 24, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:09:15 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:26:29 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:17:13</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>March 26, 2026</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:38:19 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:03:57 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:25:37</span>
        </div>
        
    </div>
</body>
</html>
