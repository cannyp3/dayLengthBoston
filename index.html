<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 23, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:51:55 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:35:26 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:43:30</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 19, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:57:01 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:41:33 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:44:32</span>
        </div>
        
    </div>
</body>
</html>
