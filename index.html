<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 06, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:19:16 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:16:15 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:56:59</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 06, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:16:04 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:12:01 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:55:57</span>
        </div>
        
    </div>
</body>
</html>
