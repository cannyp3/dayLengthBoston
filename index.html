<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (June 04, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:10:00 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>8:17:59 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>15:07:58</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>September 07, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>6:17:06 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:10:16 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>12:53:10</span>
        </div>
        
    </div>
</body>
</html>
