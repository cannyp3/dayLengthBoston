<!DOCTYPE html>
<html lang="en">
<head>
    <title>Daylight Comparison for Boston</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Daylight Comparison for Boston</h1>
    
    <div class="card">
        <h2>Today (April 29, 2026)</h2>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:43:17 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:42:14 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:58:57</span>
        </div>
    </div>
    
    <div class="card ">
        <h2>Similar Day</h2>
        
        <div class="data-row">
            <span>Date</span>
            <span>August 13, 2025</span>
        </div>
        <div class="data-row">
            <span>Sunrise</span>
            <span>5:50:35 AM</span>
        </div>
        <div class="data-row">
            <span>Sunset</span>
            <span>7:50:20 PM</span>
        </div>
        <div class="data-row">
            <span>Day Length</span>
            <span>13:59:44</span>
        </div>
        
    </div>
</body>
</html>
